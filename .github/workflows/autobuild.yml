name: Build APK Releases (arm64-v8a single)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Create prerelease GitHub Release"
        required: false
        default: true
        type: boolean
      tag_name:
        description: "Tag for manual prerelease publish (e.g. v1.2.3-beta.1)"
        required: false
        type: string

jobs:
  build:
    name: Build release APK (arm64-v8a)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 仅打 arm64-v8a，且单 APK
      - name: Build unsigned release APK (arm64-v8a only)
        run: ./gradlew :app:assembleRelease -PsplitAbi=true -PabiFilters=arm64-v8a --no-daemon

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            if [[ -n "${{ inputs.tag_name }}" ]]; then
              TAG="${{ inputs.tag_name }}"
            else
              TS=$(date -u +"%Y%m%d-%H%M%S")
              TAG="v0.0.0-beta.${TS}"
            fi
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Locate APK
        id: apk
        shell: bash
        run: |
          set -e
          APK_PATH=$(find app/build/outputs/apk/release -type f -name "*arm64-v8a*release*.apk" | head -n 1)
          if [[ -z "$APK_PATH" ]]; then
            APK_PATH=$(find app/build/outputs/apk/release -type f -name "*.apk" | head -n 1)
          fi
          test -n "$APK_PATH"
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK_PATH"

      - name: Upload unsigned release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-release-apk-arm64-v8a
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

  prerelease:
    name: Publish prerelease
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.prerelease)
    permissions:
      contents: write

    steps:
      - name: Download built APK artifact
        uses: actions/download-artifact@v4
        with:
          name: unsigned-release-apk-arm64-v8a
          path: dist

      - name: Create GitHub prerelease and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: ${{ needs.build.outputs.tag }}
          prerelease: true
          generate_release_notes: true
          files: dist/*.apk
