name: Build APK Releases

on:
  # 自动：仅在 push tag 时触发
  push:
    tags:
      - "v*"

  # 手动：可选 prerelease=true(发布) / false(仅构建产物)
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Create prerelease GitHub Release"
        required: false
        default: true
        type: boolean
      tag_name:
        description: "Tag for prerelease when manually publishing (e.g. v1.2.3-beta.1)"
        required: false
        type: string

jobs:
  prerelease:
    name: Tag/Manual Prerelease APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.prerelease)
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build unsigned release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            if [[ -n "${{ inputs.tag_name }}" ]]; then
              TAG="${{ inputs.tag_name }}"
            else
              TS=$(date -u +"%Y%m%d-%H%M%S")
              TAG="v0.0.0-beta.${TS}"
            fi
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub prerelease and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          prerelease: true
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/*.apk

  release_build:
    name: Manual Release APK Build (artifact only)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && !inputs.prerelease
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build unsigned release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Upload unsigned release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
